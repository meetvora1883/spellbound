<div class="owner-activity-monitor">  
  <h2 class="panel-title">Owner Activity Monitor</h2>  
  
  <!-- Toggle tabs -->  
  <div class="tab-buttons">  
    <button class="tab-btn active" data-tab="web">Web Activity</button>  
    <button class="tab-btn" data-tab="discord">Discord Server Activity</button>  
  </div>  
  
  <!-- Web Activity section -->  
  <div class="tab-pane active" id="web-activity">  
    <div class="search-wrapper">  
      <input type="text" class="search-input" placeholder="🔍 Filter by username...">  
    </div>  
    <div class="table-container">  
      <table class="activity-table">  
        <thead>  
          <tr>  
            <th>Avatar</th>  
            <th>Username</th>  
            <th>Discord ID</th>  
            <th>Login Time</th>  
            <th>Last Active</th>  
            <th>Status</th>  
          </tr>  
        </thead>  
        <tbody id="web-activity-body">  
          <tr><td colspan="6" class="loading">Loading...</td></tr>  
        </tbody>  
      </table>  
    </div>  
  </div>  
  
  <!-- Discord Server Activity section -->  
  <div class="tab-pane" id="discord-activity">  
    <div class="table-container">  
      <table class="activity-table">  
        <thead>  
          <tr>  
            <th>Avatar</th>  
            <th>Username</th>  
            <th>Status</th>  
            <th>Current Activity</th>  
            <th>Roles</th>  
          </tr>  
        </thead>  
        <tbody id="discord-activity-body">  
          <tr><td colspan="5" class="loading">Loading...</td></tr>  
        </tbody>  
      </table>  
    </div>  
  </div>  
</div>  
  
<style>  
  /* Dark theme styles – scoped to this panel */  
  .owner-activity-monitor {  
    background-color: #0f0f17;  
    color: #e4e6eb;  
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;  
    padding: 1.8rem 2rem;  
    border-radius: 24px;  
    box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.7);  
    margin: 1rem;  
    min-width: 0;  
  }  
  
  .panel-title {  
    font-size: 1.9rem;  
    font-weight: 600;  
    margin-top: 0;  
    margin-bottom: 1.5rem;  
    color: #ffffff;  
    letter-spacing: -0.2px;  
    border-left: 5px solid #5865f2;  
    padding-left: 1rem;  
  }  
  
  .tab-buttons {  
    display: flex;  
    gap: 1rem;  
    margin-bottom: 2rem;  
    flex-wrap: wrap;  
  }  
  
  .tab-btn {  
    background: #23233a;  
    border: none;  
    color: #b5bac1;  
    font-size: 1.1rem;  
    font-weight: 500;  
    padding: 0.8rem 2rem;  
    border-radius: 40px;  
    cursor: pointer;  
    transition: all 0.2s ease;  
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);  
    border: 1px solid #2d2d44;  
  }  
  
  .tab-btn:hover {  
    background: #2f2f4a;  
    color: #ffffff;  
  }  
  
  .tab-btn.active {  
    background: #5865f2;  
    color: white;  
    border-color: #7983f5;  
    box-shadow: 0 6px 14px rgba(88, 101, 242, 0.3);  
  }  
  
  .tab-pane {  
    display: none;  
  }  
  
  .tab-pane.active {  
    display: block;  
  }  
  
  .search-wrapper {  
    margin-bottom: 1.5rem;  
  }  
  
  .search-input {  
    width: 100%;  
    max-width: 320px;  
    padding: 0.8rem 1.2rem;  
    background-color: #1e1e30;  
    border: 1px solid #2d2d44;  
    border-radius: 50px;  
    color: #f0f3f8;  
    font-size: 0.95rem;  
    outline: none;  
    transition: 0.15s;  
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);  
  }  
  
  .search-input:focus {  
    border-color: #5865f2;  
    box-shadow: 0 0 0 3px rgba(88, 101, 242, 0.3);  
  }  
  
  .search-input::placeholder {  
    color: #6f7a8c;  
  }  
  
  .table-container {  
    overflow-x: auto;  
    border-radius: 20px;  
    background: #161622;  
    box-shadow: 0 12px 30px -8px #00000080;  
  }  
  
  .activity-table {  
    width: 100%;  
    border-collapse: collapse;  
    min-width: 700px;  
    font-size: 0.95rem;  
  }  
  
  .activity-table th {  
    text-align: left;  
    padding: 1.2rem 1rem;  
    background-color: #1c1c2c;  
    color: #a9b2c3;  
    font-weight: 500;  
    text-transform: uppercase;  
    letter-spacing: 0.3px;  
    font-size: 0.8rem;  
    border-bottom: 1px solid #2a2a40;  
  }  
  
  .activity-table td {  
    padding: 1rem 1rem;  
    border-bottom: 1px solid #24243a;  
    vertical-align: middle;  
  }  
  
  .activity-table tbody tr {  
    transition: background 0.15s;  
  }  
  
  .activity-table tbody tr:hover {  
    background-color: #202033;  
  }  
  
  .avatar {  
    width: 40px;  
    height: 40px;  
    border-radius: 50%;  
    display: flex;  
    align-items: center;  
    justify-content: center;  
    font-weight: 600;  
    font-size: 0.9rem;  
    color: white;  
    text-transform: uppercase;  
    box-shadow: 0 2px 6px black;  
    background-color: #4e4e6e;  
    background-size: cover;  
    background-position: center;  
  }  
  
  .badge {  
    display: inline-block;  
    padding: 0.3rem 1rem;  
    border-radius: 30px;  
    font-size: 0.8rem;  
    font-weight: 600;  
    text-align: center;  
    min-width: 75px;  
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);  
  }  
  
  .badge.online {  
    background-color: #23a55a;  
    color: white;  
  }  
  
  .badge.idle {  
    background-color: #f0b232;  
    color: #1e1e2a;  
  }  
  
  .badge.offline {  
    background-color: #5d6778;  
    color: #eaeef2;  
  }  
  
  .badge.dnd {  
    background-color: #da373c;  
    color: white;  
  }  
  
  .role-badge {  
    display: inline-block;  
    background-color: #2b2d40;  
    border: 1px solid #3e405b;  
    padding: 0.2rem 0.9rem;  
    border-radius: 20px;  
    font-size: 0.75rem;  
    font-weight: 500;  
    color: #cdd3e0;  
    margin-right: 0.4rem;  
    margin-bottom: 0.2rem;  
    white-space: nowrap;  
  }  
  
  .loading {  
    text-align: center;  
    padding: 2rem;  
    color: #9aa8c7;  
    font-style: italic;  
  }  

  /* ========== THEMED SCROLLBAR ========== */
  .owner-activity-monitor *::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  .owner-activity-monitor *::-webkit-scrollbar-track {
    background: rgba(0,0,0,0.3);
    border-radius: 4px;
  }
  .owner-activity-monitor *::-webkit-scrollbar-thumb {
    background: #5865f2;
    border-radius: 4px;
  }
  .owner-activity-monitor *::-webkit-scrollbar-thumb:hover {
    background: #7983f5;
  }
  /* Firefox */
  .owner-activity-monitor * {
    scrollbar-width: thin;
    scrollbar-color: #5865f2 rgba(0,0,0,0.3);
  }
  
  @media (max-width: 600px) {  
    .owner-activity-monitor {  
      padding: 1.2rem 1rem;  
    }  
    .tab-btn {  
      padding: 0.6rem 1.2rem;  
      font-size: 1rem;  
    }  
  }  
</style>  
  
<script>  
  (async function() {  
    const container = document.currentScript.parentNode;  
    const tabs = container.querySelectorAll('.tab-btn');  
    const webPane = document.getElementById('web-activity');  
    const discordPane = document.getElementById('discord-activity');  
    const webBody = document.getElementById('web-activity-body');  
    const discordBody = document.getElementById('discord-activity-body');  
    const searchInput = container.querySelector('.search-input');  
  
    // Tab switching  
    function activateTab(tabId) {  
      tabs.forEach(btn => btn.classList.remove('active'));  
      container.querySelector(`.tab-btn[data-tab="${tabId}"]`).classList.add('active');  
      if (tabId === 'web') {  
        webPane.classList.add('active');  
        discordPane.classList.remove('active');  
      } else {  
        discordPane.classList.add('active');  
        webPane.classList.remove('active');  
      }  
    }  
  
    tabs.forEach(btn => {  
      btn.addEventListener('click', (e) => {  
        activateTab(e.currentTarget.dataset.tab);  
      });  
    });  
  
    // Load web activity  
    async function loadWebActivity() {  
      webBody.innerHTML = '<tr><td colspan="6" class="loading">Loading...</td></tr>';  
      try {  
        const sessions = await apiFetch('/api/owner/web-activity');  
        webBody.innerHTML = '';  
        if (sessions.length === 0) {  
          webBody.innerHTML = '<tr><td colspan="6" class="loading">No web activity found</td></tr>';  
        } else {  
          sessions.forEach(s => {  
            const tr = document.createElement('tr');  
            const avatarUrl = s.avatar ? `https://cdn.discordapp.com/avatars/${s.user_id}/${s.avatar}.png` : '';  
            tr.innerHTML = `  
              <td><div class="avatar" style="background-image: ${avatarUrl ? `url('${avatarUrl}')` : 'none'}; background-color: #6b5b95;">${!avatarUrl ? s.username.charAt(0).toUpperCase() : ''}</div></td>  
              <td>${s.username}</td>  
              <td>${s.user_id}</td>  
              <td>${new Date(s.login_time).toLocaleTimeString()}</td>  
              <td>${s.last_active ? new Date(s.last_active).toLocaleTimeString() : '-'}</td>  
              <td><span class="badge online">Online</span></td>  
            `;  
            webBody.appendChild(tr);  
          });  
        }  
      } catch (err) {  
        webBody.innerHTML = `<tr><td colspan="6" class="error-message">Error: ${err.message}</td></tr>`;  
      }  
    }  
  
    // Load discord activity  
    async function loadDiscordActivity() {  
      discordBody.innerHTML = '<tr><td colspan="5" class="loading">Loading...</td></tr>';  
      try {  
        const activities = await apiFetch('/api/owner/discord-activity');  
        discordBody.innerHTML = '';  
        if (activities.length === 0) {  
          discordBody.innerHTML = '<tr><td colspan="5" class="loading">No Discord activity found</td></tr>';  
        } else {  
          activities.forEach(a => {  
            const tr = document.createElement('tr');  
            const avatarUrl = a.avatar ? `https://cdn.discordapp.com/avatars/${a.user_id}/${a.avatar}.png` : '';  
            const statusClass = a.status === 'online' ? 'online' : a.status === 'idle' ? 'idle' : a.status === 'dnd' ? 'dnd' : 'offline';  
            const activityText = a.activity_name ?   
              (a.activity_type === 0 ? '🎮 Playing ' :   
               a.activity_type === 1 ? '🔴 Streaming ' :   
               a.activity_type === 2 ? '🎧 Listening to ' :   
               a.activity_type === 3 ? '📺 Watching ' : '') + a.activity_name  
              : '😄 No activity';  
            tr.innerHTML = `  
              <td><div class="avatar" style="background-image: ${avatarUrl ? `url('${avatarUrl}')` : 'none'}; background-color: #6b5b95;">${!avatarUrl ? a.username.charAt(0).toUpperCase() : ''}</div></td>  
              <td>${a.username}</td>  
              <td><span class="badge ${statusClass}">${a.status}</span></td>  
              <td>${activityText}</td>  
              <td>${a.roles.map(r => `<span class="role-badge">${r.name}</span>`).join(' ')}</td>  
            `;  
            discordBody.appendChild(tr);  
          });  
        }  
      } catch (err) {  
        discordBody.innerHTML = `<tr><td colspan="5" class="error-message">Error: ${err.message}</td></tr>`;  
      }  
    }  
  
    // Filter web activity (client-side)  
    if (searchInput) {  
      searchInput.addEventListener('input', () => {  
        const filter = searchInput.value.toLowerCase();  
        const rows = webBody.querySelectorAll('tr:not(.loading):not(.error-message)');  
        rows.forEach(row => {  
          const username = row.cells[1]?.textContent.toLowerCase() || '';  
          row.style.display = username.includes(filter) ? '' : 'none';  
        });  
      });  
    }  
  
    // Load data on first open (when tab becomes active)  
    activateTab('web');  
    loadWebActivity();  
  
    // When switching to discord tab, load if not loaded  
    tabs.forEach(btn => {  
      btn.addEventListener('click', () => {  
        if (btn.dataset.tab === 'discord' && discordBody.children.length === 1 && discordBody.children[0].textContent.includes('Loading')) {  
          loadDiscordActivity();  
        }  
      });  
    });  
  })();  
</script>
