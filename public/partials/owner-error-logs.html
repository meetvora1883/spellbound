<section class="panel">
  <div class="panel-head"><span>⚠️ Error Logs</span></div>
  <div class="panel-body">
    <table>
      <thead>
        <tr>
          <th>Time (IST)</th>
          <th>Message</th>
          <th>URL</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody id="errorLogsBody"></tbody>
    </table>
  </div>
</section>
<script>
(async function() {
  const tbody = document.getElementById('errorLogsBody');
  const logs = await apiFetch('/api/admin/error-logs');
  tbody.innerHTML = logs.map(l => {
    // Convert stored UTC timestamp to Indian Standard Time
    const istTime = new Date(l.timestamp).toLocaleString('en-IN', {
      timeZone: 'Asia/Kolkata',
      day: '2-digit',
      month: '2-digit',
      year: 'numeric',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: true
    });
    return `
      <tr>
        <td>${istTime}</td>
        <td>${l.message}</td>
        <td>${l.url || ''}</td>
        <td><pre style="font-size:0.8rem; max-height:60px; overflow:auto;">${l.stack || ''}</pre></td>
      </tr>
    `;
  }).join('');
})();
</script>
