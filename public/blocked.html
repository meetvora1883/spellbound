<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Blocked</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
    }
    body {
        font-family: Arial, Helvetica, sans-serif;
        color: #ffffff;
        text-align: center;
        background: #0a0a0a;                       /* plain dark background */
        position: relative;
    }

    /* … rest of your CSS (animations) unchanged … */
    /* (keep all the keyframes, .overlay, .light-spread, etc. exactly as before) */

    @keyframes lightSpread {
        0% { opacity: 0; transform: scale(0.1); }
        15% { opacity: 0.8; }
        100% { opacity: 0; transform: scale(4); }
    }

    @keyframes continuousPulse {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50% { opacity: 0.4; transform: scale(1.1); }
    }

    @keyframes raySpread {
        0% { opacity: 0; transform: rotate(var(--rotation)) translateY(0); }
        20% { opacity: 0.6; }
        100% { opacity: 0; transform: rotate(var(--rotation)) translateY(100vh); }
    }

    @keyframes rotateCircle {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    @keyframes pulseBorder {
        0%, 100% { border-color: rgba(255, 230, 0, 0.15); box-shadow: 0 0 100px rgba(255, 230, 0, 0.3); }
        50% { border-color: rgba(255, 230, 0, 0.25); box-shadow: 0 0 150px rgba(255, 230, 0, 0.6); }
    }

    @keyframes warningPulse {
        0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(255, 230, 0, 0.7)); }
        50% { transform: scale(1.1); filter: drop-shadow(0 0 20px rgba(255, 230, 0, 1)); }
    }

    @keyframes textGlow {
        0%, 100% { text-shadow: 0 0 8px rgba(255, 230, 0, 0.5), 0 0 2px rgba(255, 230, 0, 0.3); }
        50% { text-shadow: 0 0 15px rgba(255, 230, 0, 0.8), 0 0 5px rgba(255, 230, 0, 0.5); }
    }

    @keyframes waveSpread {
        0% { opacity: 0; transform: scale(0.1); }
        50% { opacity: 0.3; }
        100% { opacity: 0; transform: scale(2.5); }
    }

    @keyframes flicker {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 0.4; }
    }

    .overlay {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background: radial-gradient(circle at center, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.95) 100%);
        overflow: hidden;
    }

    .light-spread {
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, rgba(255, 230, 0, 0.6) 0%, rgba(255, 230, 0, 0.3) 20%, transparent 60%);
        opacity: 0;
        animation: lightSpread 3s ease-out infinite;
        pointer-events: none;
        z-index: 1;
        will-change: transform, opacity;
    }

    .center-glow {
        position: absolute;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 230, 0, 0.4) 0%, transparent 70%);
        animation: continuousPulse 2.5s ease-in-out infinite;
        pointer-events: none;
        z-index: 1;
        will-change: transform, opacity;
    }

    .light-ray {
        position: absolute;
        width: 1px;
        height: 0;
        top: 50%;
        left: 50%;
        background: linear-gradient(to bottom, transparent, rgba(255, 230, 0, 0.6), transparent);
        transform-origin: 0 0;
        opacity: 0;
        pointer-events: none;
        z-index: 1;
        will-change: transform, opacity;
    }

    .wave {
        position: absolute;
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 1px solid rgba(255, 230, 0, 0.2);
        top: 50%;
        left: 50%;
        margin-top: -40px;
        margin-left: -40px;
        opacity: 0;
        pointer-events: none;
        z-index: 1;
        will-change: transform, opacity;
    }

    .logo {
        position: absolute;
        width: 50vmin;
        height: 50vmin;
        border-radius: 50%;
        border: 10px solid rgba(255, 230, 0, 0.1);
        pointer-events: none;
        animation: rotateCircle 50s linear infinite, pulseBorder 4s ease-in-out infinite;
        z-index: 2;
        will-change: transform;
    }

    .logo::before {
        content: '';
        position: absolute;
        top: -5px; left: -5px; right: -5px; bottom: -5px;
        border-radius: 50%;
        border: 5px solid transparent;
        border-top-color: rgba(255, 230, 0, 0.2);
        animation: rotateCircle 30s linear infinite reverse;
        will-change: transform;
    }

    .logo::after {
        content: '';
        position: absolute;
        top: -15px; left: -15px; right: -15px; bottom: -15px;
        border-radius: 50%;
        border: 3px solid transparent;
        border-bottom-color: rgba(255, 230, 0, 0.1);
        animation: rotateCircle 40s linear infinite;
        will-change: transform;
    }

    .warning-icon {
        font-size: 48px;
        color: #ffe600;
        margin-bottom: 15px;
        z-index: 3;
        animation: warningPulse 2s ease-in-out infinite;
        will-change: transform, filter;
    }

    .title {
        font-size: 20px;
        letter-spacing: 2px;
        margin-bottom: 15px;
        font-weight: bold;
        z-index: 3;
        animation: textGlow 2s ease-in-out infinite;
        will-change: text-shadow;
    }

    .info-line {
        font-size: 13px;
        margin: 4px 0;
        opacity: 0.9;
        z-index: 3;
        animation: textGlow 2s ease-in-out infinite;
        animation-delay: calc(var(--line-index) * 0.1s);
        will-change: text-shadow;
    }

    .edge-glow {
        position: absolute;
        inset: 0;
        box-shadow: inset 0 0 50px rgba(255, 230, 0, 0.05), inset 0 0 100px rgba(255, 230, 0, 0.02);
        pointer-events: none;
        z-index: 0;
        animation: flicker 2s ease-in-out infinite;
        will-change: opacity;
    }
</style>
</head>
<body>
<div class="overlay">
    <div class="edge-glow"></div>
    <div class="light-spread"></div>
    <div class="center-glow"></div>
    <div class="wave wave-1"></div>
    <div class="wave wave-2"></div>
    <div class="wave wave-3"></div>
    <div class="logo"></div>
    <div class="warning-icon">⚠️</div>
    <div class="title">YOUR ACCOUNT IS BLOCKED</div>

    <div class="info-line" style="--line-index:1">Admin name: {{adminName}}</div>
    <div class="info-line" style="--line-index:2">Reason: {{reason}}</div>
    <div class="info-line" style="--line-index:3">Date of blocking: {{banDate}}</div>
    <div class="info-line" style="--line-index:4">Discord ID: {{discordId}}</div>
    <div class="info-line" style="--line-index:5">Username: {{username}}</div>
</div>

<script>
    // Create limited number of light rays
    function createLightRays() {
        const overlay = document.querySelector('.overlay');
        const rayCount = 16;
        for (let i = 0; i < rayCount; i++) {
            const ray = document.createElement('div');
            ray.classList.add('light-ray');
            const rotation = (360 / rayCount) * i;
            ray.style.setProperty('--rotation', `${rotation}deg`);
            const length = window.innerHeight * 1.5;
            const delay = (i * 0.1) % 3;
            const duration = 2 + Math.random();
            ray.style.height = `${length}px`;
            ray.style.animation = `raySpread ${duration}s ease-out infinite`;
            ray.style.animationDelay = `${delay}s`;
            overlay.appendChild(ray);
        }
    }

    // Create limited particles
    function createParticles() {
        const overlay = document.querySelector('.overlay');
        const particleCount = 20;
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.style.position = 'absolute';
            particle.style.width = `${Math.random() * 4 + 1}px`;
            particle.style.height = particle.style.width;
            particle.style.background = 'radial-gradient(circle, rgba(255, 230, 0, 0.6) 0%, transparent 70%)';
            particle.style.borderRadius = '50%';
            particle.style.pointerEvents = 'none';
            particle.style.zIndex = '1';
            particle.style.willChange = 'transform, opacity';
            const angle = Math.random() * Math.PI * 2;
            const radius = Math.random() * 50;
            const startX = window.innerWidth / 2 + Math.cos(angle) * radius;
            const startY = window.innerHeight / 2 + Math.sin(angle) * radius;
            particle.style.left = `${startX}px`;
            particle.style.top = `${startY}px`;
            const distance = 50 + Math.random() * 200;
            const targetX = Math.cos(angle) * distance;
            const targetY = Math.sin(angle) * distance;
            const duration = 1.5 + Math.random();
            const delay = Math.random() * 2;
            const animName = `particleAnim${i}`;
            const style = document.createElement('style');
            style.textContent = `
                @keyframes ${animName} {
                    0% { transform: translate(0, 0); opacity: 0; }
                    10% { opacity: 0.7; }
                    90% { opacity: 0.7; }
                    100% { transform: translate(${targetX}px, ${targetY}px); opacity: 0; }
                }
            `;
            document.head.appendChild(style);
            particle.style.animation = `${animName} ${duration}s ease-out infinite`;
            particle.style.animationDelay = `${delay}s`;
            overlay.appendChild(particle);
        }
    }

    // Create wave animations
    function createWaves() {
        const waves = document.querySelectorAll('.wave');
        const delays = [0, 0.6, 1.2];
        waves.forEach((wave, index) => {
            wave.style.animation = `waveSpread 2.5s ease-out infinite`;
            wave.style.animationDelay = `${delays[index]}s`;
        });
    }

    let lastTime = 0;
    const bgInterval = 1000 / 30;
    function addParallaxEffect(timestamp) {
        if (timestamp - lastTime >= bgInterval) {
            const x = Math.sin(timestamp / 10000) * 10;
            const y = Math.cos(timestamp / 12000) * 8;
             document.body.style.backgroundPosition = `calc(50% + ${x}px) calc(50% + ${y}px)`;
            lastTime = timestamp;
        }
        requestAnimationFrame(addParallaxEffect);
    }

    function preventCopying() {
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', e => {
            if ((e.ctrlKey && [65, 67, 85, 83, 80].includes(e.keyCode)) || (e.ctrlKey && e.shiftKey && e.keyCode === 73) || e.keyCode === 123) {
                e.preventDefault();
                return false;
            }
        });
        document.addEventListener('dragstart', e => e.preventDefault());
        document.addEventListener('selectstart', e => e.preventDefault());
    }

    document.addEventListener('DOMContentLoaded', () => {
        createLightRays();
        createParticles();
        createWaves();
        preventCopying();
        requestAnimationFrame(addParallaxEffect);
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                document.querySelectorAll('.light-ray, [style*="particle"]').forEach(el => el.remove());
                createLightRays();
                createParticles();
            }, 200);
        });
    });

    document.addEventListener('visibilitychange', () => {
        const state = document.hidden ? 'paused' : 'running';
        document.querySelectorAll('div').forEach(el => el.style.animationPlayState = state);
    });
</script>
</body>
</html>
