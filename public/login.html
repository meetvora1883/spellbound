<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Warboard Portal</title>
  <link rel="icon" href="/favicon.ico">
  <script src="/favicon.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: radial-gradient(1200px 700px at 0% 0%, #1f2937, transparent 60%),
                  radial-gradient(1200px 700px at 100% 100%, #1f2937, transparent 60%),
                  linear-gradient(135deg, #020617, #020617);
    }

    body::before {
      content: "";
      position: fixed;
      inset: -20%;
      background:
        radial-gradient(circle at 10% 10%, rgba(96, 165, 250, 0.35), transparent 55%),
        radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.4), transparent 55%),
        radial-gradient(circle at 50% -20%, rgba(34, 197, 94, 0.3), transparent 60%);
      mix-blend-mode: screen;
      opacity: 0.95;
      animation: bgMove 24s linear infinite alternate;
      pointer-events: none;
      z-index: -1;
    }

    @keyframes bgMove {
      0%   { transform: translate3d(-20px, -10px, 0) scale(1.02); }
      50%  { transform: translate3d(20px, 12px, 0)  scale(1.06); }
      100% { transform: translate3d(-15px, 25px, 0) scale(1.03); }
    }

    .page {
      position: relative;
      width: min(1100px, 100%);
      height: min(620px, 100vh);
    }

    .ticket-layer {
      position: absolute;
      inset: -40px;
      pointer-events: none;
      opacity: 0.6;
      z-index: 0;
    }

    .ticket {
      position: absolute;
      width: 120px;
      height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(15, 23, 42, 0.8);
      background: linear-gradient(145deg, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.4));
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.65);
      opacity: 0.25;
      transform: translateZ(0);
      animation: float 18s ease-in-out infinite;
    }

    .ticket:nth-child(1) { top: 8%;  left: 15%; animation-delay: -2s;  }
    .ticket:nth-child(2) { top: 26%; left: 70%; animation-delay: -7s;  }
    .ticket:nth-child(3) { top: 68%; left: 10%; animation-delay: -11s; }
    .ticket:nth-child(4) { top: 80%; left: 60%; animation-delay: -15s; }
    .ticket:nth-child(5) { top: 40%; left: 40%; animation-delay: -4s;  }

    @keyframes float {
      0%   { transform: translate3d(0, 0, 0) rotate(-9deg); }
      50%  { transform: translate3d(18px, -14px, 0) rotate(-3deg); }
      100% { transform: translate3d(-10px, 12px, 0) rotate(-11deg); }
    }

    .intro-wrapper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      row-gap: 6px;
      max-width: 32vw;
      animation: slideLeft 1.6s ease-out 0.4s forwards;
      filter: drop-shadow(0 18px 40px rgba(0, 0, 0, 0.75));
      z-index: 3;
    }

    @keyframes slideLeft {
      0% {
        left: 50%;
        transform: translate(-50%, -50%) scale(0.96);
        opacity: 0;
      }
      30% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        left: 10%;
        transform: translate(0, -50%) scale(1);
        opacity: 1;
      }
    }

    .intro-avatar {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 2px solid rgba(148, 163, 184, 0.8);
      background:
        radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.45), transparent 60%),
        linear-gradient(145deg, #4f46e5, #22c55e);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.8);
      animation: avatarPulse 2.4s ease-in-out infinite, avatarSpin 24s linear infinite;
      transform-origin: 50% 50%;
      flex: 0 0 auto;
      background-size: cover;
      background-position: center;
    }

    @keyframes avatarPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 18px 45px rgba(0, 0, 0, 0.8); }
      50%      { transform: scale(1.06); box-shadow: 0 24px 70px rgba(34, 197, 94, 0.9); }
    }

    @keyframes avatarSpin {
      0%   { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    .intro-name {
      font-size: clamp(1.4rem, 2vw + 0.4rem, 1.9rem);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      color: transparent;
      background-image: linear-gradient(
        120deg,
        #f9fafb 0%,
        #e5e7eb 20%,
        #a5b4fc 40%,
        #22c55e 60%,
        #f9fafb 80%
      );
      background-size: 220% auto;
      -webkit-background-clip: text;
      background-clip: text;
      animation: nameShine 4s linear infinite 1s;
      line-height: 1.1;
    }

    @keyframes nameShine {
      0%   { background-position: 0% 50%;   }
      100% { background-position: 200% 50%; }
    }

    .card {
      position: absolute;
      top: 50%;
      right: 10%;
      transform: translateY(-50%);
      width: 340px;
      padding: 22px 22px 16px;
      border-radius: 18px;
      background: radial-gradient(circle at top, rgba(148, 163, 184, 0.28), transparent 55%),
                  rgba(15, 23, 42, 0.98);
      border: 1px solid rgba(148, 163, 184, 0.35);
      box-shadow: 0 26px 65px rgba(0, 0, 0, 0.85);
      display: flex;
      flex-direction: column;
      gap: 18px;
      opacity: 0;
      animation: fadeInCard 1.1s cubic-bezier(0.22, 0.9, 0.3, 1.1) 0.7s forwards,
                 cardBreath 8s ease-in-out infinite 1.6s;
      z-index: 2;
    }

    @keyframes fadeInCard {
      0% {
        opacity: 0;
        transform: translateY(-54%) scale(0.94);
      }
      100% {
        opacity: 1;
        transform: translateY(-50%) scale(1);
      }
    }

    @keyframes cardBreath {
      0%, 100% { transform: translateY(-50%) scale(1); box-shadow: 0 26px 65px rgba(0, 0, 0, 0.85); }
      50%      { transform: translateY(-51%) scale(1.01); box-shadow: 0 32px 80px rgba(88, 101, 242, 0.9); }
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      text-align: center;
      color: #f9fafb;
      margin-bottom: 8px;
    }

    .card-sub {
      font-size: 0.9rem;
      text-align: center;
      color: #9ca3af;
      margin-bottom: 16px;
    }

    .login-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .login-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 0;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.2s;
      text-decoration: none;
    }

    .login-btn.member {
      background: #22c55e;
      color: white;
      box-shadow: 0 8px 20px rgba(34, 197, 94, 0.4);
    }
    .login-btn.member:hover {
      background: #16a34a;
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(34, 197, 94, 0.6);
    }

    .login-btn.admin {
      background: #5865f2;
      color: white;
      box-shadow: 0 8px 20px rgba(88, 101, 242, 0.4);
    }
    .login-btn.admin:hover {
      background: #4f5be6;
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(88, 101, 242, 0.6);
    }

    .separator {
      margin: 8px 0;
      text-align: center;
      font-size: 0.85rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .admin-form {
      display: none;
      margin-top: 8px;
    }
    .admin-form.visible {
      display: block;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field-label {
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .field-input {
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(55, 65, 81, 0.9);
      background: rgba(15, 23, 42, 0.95);
      color: #e5e7eb;
      font-size: 0.9rem;
      outline: none;
    }

    .field-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.3);
    }

    .login-submit {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .back-link {
      color: #9ca3af;
      text-align: center;
      font-size: 0.85rem;
      margin-top: 8px;
      cursor: pointer;
      text-decoration: underline;
    }

    .error-message {
      color: #ff6b6b;
      text-align: center;
      font-size: 0.85rem;
    }
    .hidden { display: none; }

    .card-footer {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      font-size: 0.78rem;
      color: #9ca3af;
      border-top: 1px solid rgba(31, 41, 55, 0.9);
      padding-top: 10px;
      margin-top: 10px;
    }

    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 9px;
      border-radius: 999px;
      border: 1px solid rgba(75, 85, 99, 0.9);
      cursor: pointer;
      background: rgba(15, 23, 42, 0.95);
      color: #e5e7eb;
    }

    .theme-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: #e5e7eb;
    }

    body.theme-light {
      color: #020617;
      background: radial-gradient(1200px 700px at 0% 0%, #e5e7eb, transparent 60%),
                  radial-gradient(1200px 700px at 100% 100%, #e0e7ff, transparent 60%),
                  linear-gradient(135deg, #f3f4f6, #e5e7eb);
    }

    body.theme-light .card {
      background: radial-gradient(circle at top, rgba(209, 213, 219, 0.9), transparent 55%),
                  #ffffff;
      border-color: rgba(148, 163, 184, 0.7);
    }
    body.theme-light .card-title { color: #020617; }
    body.theme-light .card-sub { color: #4b5563; }
  </style>
</head>
<body>
  <div class="page">
    <div class="ticket-layer">
      <div class="ticket"></div><div class="ticket"></div><div class="ticket"></div><div class="ticket"></div><div class="ticket"></div>
    </div>

    <div class="intro-wrapper">
      <div class="intro-avatar" id="botAvatar"></div>
      <div class="intro-name" id="botName">Loading...</div>
    </div>

    <div class="card">
      <div class="card-title">Warboard Portal</div>
      <div class="card-sub" id="cardSub">Choose your login method</div>

      <!-- Main options -->
      <div id="mainOptions" class="login-options">
        <a href="/auth/discord/member" class="login-btn member">
          <i class="fab fa-discord"></i> Login as Member
        </a>
        <button class="login-btn admin" id="showAdminBtn">
          <i class="fas fa-user-shield"></i> Admin Login
        </button>
      </div>

      <!-- Admin login form (hidden initially) -->
      <div id="adminFormContainer" class="admin-form">
        <form class="field-group" id="adminLoginForm">
          <div class="field">
            <label class="field-label">Username</label>
            <input type="text" id="adminUsername" class="field-input" required>
          </div>
          <div class="field">
            <label class="field-label">Password</label>
            <input type="password" id="adminPassword" class="field-input" required>
          </div>
          <button type="submit" class="login-submit">Continue</button>
        </form>
        <div class="back-link" id="backToMain">← Back to login options</div>
      </div>

      <!-- Discord step for admin (shown after local auth) -->
      <div id="adminDiscordSection" class="hidden">
        <div class="separator">Step 2 – Continue with Discord</div>
        <a href="/auth/discord" class="login-btn admin" style="display:flex; justify-content:center;">
          <i class="fab fa-discord"></i> Authorize with Discord
        </a>
        <div class="back-link" id="backFromDiscord">← Back</div>
      </div>

      <div id="errorMessage" class="error-message hidden"></div>

      <div class="card-footer">
        <div class="theme-toggle" id="themeToggle">
          <div class="theme-dot"></div>
          <span id="themeLabel">Theme</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Load bot info for intro
    fetch('/api/bot/info')
      .then(res => {
        if (!res.ok) {
          if (res.status === 503) throw new Error('Bot is still starting...');
          throw new Error('Failed to load bot info');
        }
        return res.json();
      })
      .then(data => {
        document.getElementById('botName').textContent = data.username;
        if (data.avatar) {
          document.getElementById('botAvatar').style.backgroundImage = `url(${data.avatar})`;
        }
      })
      .catch(err => {
        console.error('Bot info error:', err);
        document.getElementById('botName').textContent = 'Warboard Bot';
        const errorEl = document.getElementById('errorMessage');
        errorEl.textContent = err.message + ' You can still log in.';
        errorEl.classList.remove('hidden');
      });

    const showAdminBtn = document.getElementById('showAdminBtn');
    const mainOptions = document.getElementById('mainOptions');
    const adminFormContainer = document.getElementById('adminFormContainer');
    const adminDiscordSection = document.getElementById('adminDiscordSection');
    const backToMain = document.getElementById('backToMain');
    const backFromDiscord = document.getElementById('backFromDiscord');
    const adminForm = document.getElementById('adminLoginForm');
    const errorEl = document.getElementById('errorMessage');
    const cardSub = document.getElementById('cardSub');

    showAdminBtn.addEventListener('click', () => {
      mainOptions.style.display = 'none';
      adminFormContainer.classList.add('visible');
      cardSub.textContent = 'Admin: enter credentials';
    });

    backToMain.addEventListener('click', () => {
      adminFormContainer.classList.remove('visible');
      adminDiscordSection.classList.add('hidden');
      mainOptions.style.display = 'flex';
      cardSub.textContent = 'Choose your login method';
    });

    backFromDiscord.addEventListener('click', () => {
      adminDiscordSection.classList.add('hidden');
      adminFormContainer.classList.add('visible');
    });

    adminForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('adminUsername').value.trim();
      const password = document.getElementById('adminPassword').value;

      try {
        const res = await fetch('/auth/local-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'include'
        });
        const data = await res.json();
        if (res.ok) {
          // Hide form, show Discord button
          adminFormContainer.classList.remove('visible');
          adminDiscordSection.classList.remove('hidden');
          cardSub.textContent = 'Step 2: authorize with Discord';
          errorEl.classList.add('hidden');
        } else {
          errorEl.textContent = data.error || 'Invalid credentials';
          errorEl.classList.remove('hidden');
        }
      } catch (err) {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.classList.remove('hidden');
      }
    });

    // Theme toggle
    const toggle = document.getElementById('themeToggle');
    const themeLabel = document.getElementById('themeLabel');
    toggle.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('theme-light');
      themeLabel.textContent = isLight ? 'Light' : 'Theme';
    });
  </script>
</body>
</html>
